# ============================================================
# Perfil PRODUCTION - ativado em Render/EC2 via env var:
# SPRING_PROFILES_ACTIVE=production
# ============================================================

# AWS SES SMTP (valores vem de variaveis de ambiente do servidor)
spring.mail.host=${SPRING_MAIL_HOST:email-smtp.us-east-2.amazonaws.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}

# Email remetente
app.email.remetente=${APP_EMAIL_REMETENTE:}
app.email.nome-remetente=${APP_EMAIL_NOME_REMETENTE:Sistema de Recibos - Precisao}

# Credenciais AWS SES
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
