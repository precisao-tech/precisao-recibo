spring.application.name=recibo

# Server Configuration - Escutar em todas as interfaces para acesso externo
server.address=0.0.0.0
server.port=8080

# SES SMTP Configuration (Ohio)
spring.mail.host=${SPRING_MAIL_HOST:email-smtp.us-east-2.amazonaws.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Email Configuration - Gmail configurado no AWS SES
app.email.remetente=${APP_EMAIL_REMETENTE:noreply@reciboprecisao.com.br}
app.email.nome-remetente=${APP_EMAIL_NOME_REMETENTE:Sistema de Recibos - Precisao}

# AWS SES (Ohio)
aws.region=${AWS_REGION:us-east-2}
aws.ses.endpoint=${AWS_SES_ENDPOINT:email.us-east-2.amazonaws.com}

# Credenciais AWS (preferir IAM Role em EC2)
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}

# API Externa - Empreendimentos (Credenciais Protegidas)
api.empreendimento.url=https://services.livefacilities.com.br/mobile/api/Empreendimento/EmpreendimentoLista
api.empreendimento.nm_sistema=${API_EMPREENDIMENTO_NM_SISTEMA:PRE}
api.empreendimento.id_pessoafisica=${API_EMPREENDIMENTO_ID_PESSOAFISICA:2091}
api.empreendimento.id_sessao=${API_EMPREENDIMENTO_ID_SESSAO:f81b72d3-ab99-4078-9d03-77a4d9051420}
api.empreendimento.id_chavedispositivo=${API_EMPREENDIMENTO_ID_CHAVEDISPOSITIVO:api}

# API Externa - Validação de CPF
# ReceitaWS oferece API pública gratuita, mas com limitações de rate limiting
# Se a API falhar, o sistema usa fallback validando apenas dígitos verificadores
# Para produção com alto volume, considere usar API paga (ReceitaWS Comercial, Serpro, etc)
api.cpf.validacao.url=${API_CPF_VALIDACAO_URL:https://api.receitaws.com.br/v1/cpf}

# SpringDoc OpenAPI (Swagger) Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.urls[0].url=/v3/api-docs
springdoc.swagger-ui.urls[0].name=Default
springdoc.swagger-ui.use-root-path=true
springdoc.cors.enabled=true
springdoc.cors.allowed-origins=*
